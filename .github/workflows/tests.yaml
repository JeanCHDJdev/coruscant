name: unit-tests

on:
  push:
    paths:
      - "coruscant/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "coruscant/**"
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - "pyproject.toml"

jobs:
  unittest:
    name: Run unittest
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v